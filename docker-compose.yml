version: '3.8'

services:
  # Môi trường Spark & Python hoàn chỉnh
  spark-env:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: movie_spark_env
    ports:
      - "8888:8888" # Cổng cho giao diện Jupyter Lab để viết code
      - "4040:4040" # Cổng theo dõi tiến trình Spark UI
    volumes:
      # Ánh xạ toàn bộ thư mục code hiện tại vào trong Docker
      - .:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
    command: start-notebook.sh --NotebookApp.token='' # Tắt pass để vào thẳng cho tiện

  # Môi trường chạy Next.js Frontend
  frontend:
    image: node:20
    container_name: movie_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
